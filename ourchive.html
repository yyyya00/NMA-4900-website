<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ourchive</title>

  <link rel="stylesheet" href="https://use.typekit.net/dwz0gvg.css">
  <link rel="stylesheet" href="ourchive.css" />
</head>
<body>
  <div class="bg-noise"></div>
  <div class="grid-overlay"></div>
  <div class="bg-orb orb-cyan"></div>
  <div class="bg-orb orb-magenta"></div>
  <div class="bg-orb orb-yellow"></div>

  <main class="site-shell">
    <header class="hero">
      <div class="hero-frame">
        <h1 class="system-status">OURCHIVE SYSTEM / MEMORY ACCESS / SPRING 2026</h1>

        <div class="compass-scene" aria-label="Ourchive navigation logo">
          <div class="compass-logo">

            <a href="interphase.html" class="arc-link arc-top" aria-label="Go to Interphases page">
              <span>I</span><span>N</span><span>T</span><span>E</span><span>R</span><span>P</span><span>H</span><span>A</span><span>S</span><span>E</span><span>S</span>
            </a>

            <a href="interfaces.html" class="arc-link arc-bottom" aria-label="Go to Interfaces page">
              <span>I</span><span>N</span><span>T</span><span>E</span><span>R</span><span>F</span><span>A</span><span>C</span><span>E</span><span>S</span>
            </a>

            <div class="orb-core">
              <div class="compass-needle-wrap" aria-hidden="true">
                <div class="compass-needle"></div>
                <div class="compass-needle-center"></div>
              </div>
              
              <div class="orb-title" aria-label="Ourchive title">
                <span>O</span>
                <span>U</span>
                <span>R</span>
                <span>C</span>
                <span>H</span>
                <span>I</span>
                <span>V</span>
                <span>E</span>
              </div>
            </div>

          </div>
        </div>
      </div>
    </header>
  </main>
</body>
</html>

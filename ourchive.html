<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ourchive</title>

  <link rel="stylesheet" href="https://use.typekit.net/dwz0gvg.css">
  <link rel="stylesheet" href="ourchive.css" />
</head>
<body>
  <div class="bg-noise"></div>
  <div class="grid-overlay"></div>
  <div class="bg-orb orb-cyan"></div>
  <div class="bg-orb orb-magenta"></div>
  <div class="bg-orb orb-yellow"></div>

  <main class="site-shell">
    <header class="hero">
      <div class="hero-frame">
        <h1 class="system-status">OURCHIVE SYSTEM / MEMORY ACCESS / SPRING 2026</h1>

        <div class="compass-scene">
          <div class="compass-logo">
            <div class="orb-core">

              <img src="ourchive word.png" class="orb-wordmark-img" />

              <a href="interfaces.html" class="corner-link top-left">
                <img src="ourchive interface.png" class="corner-img interface-img"/>
              </a>

              <a href="interphase.html" class="corner-link bottom-right">
                <img src="ourchive interphase.png" class="corner-img interphase-img"/>
              </a>

              <div class="compass-needle-wrap">
                <div class="compass-needle"></div>
                <div class="compass-needle-center"></div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </header>
  </main>

  <!-- 🔥 SCRIPT -->
  <script>
    const needle = document.querySelector('.compass-needle');
    const orb = document.querySelector('.orb-core');

    let currentAngle = 0;
    let targetAngle = 0;

    window.addEventListener('mousemove', (e) => {
      const rect = orb.getBoundingClientRect();

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const dx = e.clientX - centerX;
      const dy = e.clientY - centerY;

      targetAngle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
    });

    function animate() {
      currentAngle += (targetAngle - currentAngle) * 0.08;

      needle.style.transform =
        `translate(-50%, -50%) rotate(${currentAngle}deg)`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://use.typekit.net/dwz0gvg.css">
  
  <title>Ourchive</title>
  <link rel="stylesheet" href="ourchive.css" />
  <style>
    
  </style>
</head>
<body>
  <div class="bg-noise"></div>
  <div class="grid-overlay"></div>
  <div class="bg-orb orb-cyan"></div>
  <div class="bg-orb orb-magenta"></div>
  <div class="bg-orb orb-yellow"></div>

  <main class="site-shell">
    <header class="hero">
      <div class="hero-frame">
        <h1 class="system-status">OURCHIVE SYSTEM / MEMORY ACCESS / SPRING 2026</h1>

        <div class="book-scene" aria-label="Animated opening archive book">
          <div class="book-logo">
            <div class="book-base-glow"></div>

            <div class="book-spine"></div>
            <div class="book-cover left"></div>
            <div class="book-cover right"></div>

            <div class="book-core-light"></div>

            <div class="page-rays" aria-hidden="true">
              <span class="ray r1"></span>
              <span class="ray r2"></span>
              <span class="ray r3"></span>
              <span class="ray r4"></span>
              <span class="ray r5"></span>
              <span class="ray r6"></span>
              <span class="ray r7"></span>
              <span class="ray r8"></span>
              <span class="ray r9"></span>
            </div>

            <div class="particles" aria-hidden="true">
              <span class="particle p1"></span>
              <span class="particle p2"></span>
              <span class="particle p3"></span>
              <span class="particle p4"></span>
              <span class="particle p5"></span>
              <span class="particle p6"></span>
              <span class="particle p7"></span>
              <span class="particle p8"></span>
            </div>

            <div class="title-projection" aria-label="Ourchive title">
              <span class="title-main">OURCHIVE</span>
            </div>
          </div>
        </div>

        <a href="#floors" class="enter-scroll">ENTER OURCHIVE ↓</a>
      </div>
    </header>

    <section class="folder-section" id="floors">
      <h1 class="section-label">FLOORS</h1>

      <div class="folder-area">
        <a href="interfaces.html" class="folder-link">
          <div class="folder-icon">
            <div class="folder-tab"></div>
            <div class="folder-body"></div>
            <div class="folder-line line-1"></div>
            <div class="folder-line line-2"></div>
            <div class="folder-sticker sticker-cyan"></div>
          </div>
          <span class="folder-text">INTERFACES</span>
        </a>

        <a href="interphase.html" class="folder-link">
          <div class="folder-icon">
            <div class="folder-tab"></div>
            <div class="folder-body"></div>
            <div class="folder-line line-1"></div>
            <div class="folder-line line-2"></div>
            <div class="folder-sticker sticker-magenta"></div>
          </div>
          <span class="folder-text">INTERPHASES</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
